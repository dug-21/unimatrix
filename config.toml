# Unimatrix configuration file.
#
# All sections are optional. Absent sections apply compiled defaults.
# Copy this file to ~/.unimatrix/config.toml (global) or
# ~/.unimatrix/{project-hash}/config.toml (per-project) and edit as needed.
#
# Field omission behaviour: when a field is absent from this file, the compiled
# serde default applies (shown in comments as "Default:"). The serde defaults
# govern TOML omission; the Rust Default::default() impl governs programmatic
# construction — these can differ (see boosted_categories / adaptive_categories).

# =============================================================================
# [profile] — Preset selection
# =============================================================================

[profile]
# Active configuration preset. Controls how confidence components are weighted
# for knowledge scoring. Accepted values:
#   collaborative  — balanced weights; suited for team-based agentic delivery
#   authoritative  — trust and correction signals elevated; suited for structured pipelines
#   operational    — freshness and correction signals elevated; suited for ops domains
#   empirical      — helpfulness and co-access signals elevated; suited for research
#   custom         — use explicit [confidence.weights] block below (all 6 required)
# Default: "collaborative"
preset = "collaborative"

# To use custom confidence weights instead of a preset, set:
# preset = "custom"
# and configure the [confidence.weights] block in the Advanced Configuration
# section at the bottom of this file.

# =============================================================================
# [knowledge] — Categories and freshness configuration
# =============================================================================

[knowledge]
# Active knowledge categories. Defines the allowlist of accepted category values.
# Entries using categories not in this list are rejected at write time.
# To add custom categories, extend this list — do not remove the built-in values
# unless you have migrated all existing entries.
# Default: the 5 built-in categories
categories = ["lesson-learned", "decision", "convention", "pattern", "procedure"]

# Categories that receive an additional ranking boost in search results.
#
# NOTE — two-site default distinction:
#   When this field is OMITTED from config.toml (serde default): ["lesson-learned"]
#   When constructed programmatically via Default::default():     []
# This file shows the serde default — the value you get when the field is absent.
# Explicitly setting [] here overrides the serde default and disables the boost.
# Default (serde): ["lesson-learned"]
boosted_categories = ["lesson-learned"]

# Categories eligible for adaptive lifecycle management (confidence decay adjustment).
# Must be a subset of `categories`.
#
# Same two-site default distinction as boosted_categories:
#   Serde default (field omitted): ["lesson-learned"]
#   Rust Default::default():       []
# Default (serde): ["lesson-learned"]
adaptive_categories = ["lesson-learned"]

# Override the freshness half-life used in confidence scoring.
# When absent, the active preset's built-in half-life is used.
# Required when preset = "custom".
# Accepted values: positive float, in hours. Max: 87600.0 (10 years).
# Example: 720.0 = 30 days
# freshness_half_life_hours = 720.0

# =============================================================================
# [server] — Server presentation
# =============================================================================

[server]
# Custom system prompt injected into context briefings delivered to agents.
# When absent, the compiled SERVER_INSTRUCTIONS constant is used.
# Accepts a multi-line string. Max: 8192 bytes. Content is scanned at startup.
# instructions = "You are an expert in..."

# =============================================================================
# [agents] — Trust and capability defaults for auto-enrolled agents
# =============================================================================

[agents]
# Trust level assigned to agents that auto-enroll (not yet in the registry).
# Accepted values: "permissive", "restricted", "admin"
# Default: "permissive"
default_trust = "permissive"

# Capabilities granted per-session to known agents.
# Values are case-sensitive. Accepted: "Read", "Write", "Search"
# ("Admin" is excluded from session capabilities — admin operations require
# explicit enrollment via context_enroll, not session defaults.)
# Default: ["Read", "Write", "Search"]
session_capabilities = ["Read", "Write", "Search"]

# =============================================================================
# [retention] — Data lifecycle and pruning
# =============================================================================

[retention]
# Number of delivery cycles for which per-cycle activity detail is retained.
# Observations, query_log, sessions, and injection_log for cycles beyond this
# window are pruned after their cycle_review_index row exists.
# This value is also the governing ceiling for PhaseFreqTable lookback and
# future training windows. Reducing it truncates data for PhaseFreqTable::rebuild.
# Range: [1, 10000]. Default: 50
activity_detail_retention_cycles = 50

# Number of days audit log entries are retained before pruning.
# Audit data is an accountability record, not a learning signal.
# Range: [1, 3650]. Default: 180
audit_log_retention_days = 180

# Maximum number of purgeable cycles processed per maintenance tick.
# Limits the GC work done per tick to avoid blocking the query path.
# Older cycles (lowest computed_at) are processed first; deferred cycles are
# picked up on the next tick.
# Range: [1, 1000]. Default: 10
max_cycles_per_tick = 10

# =============================================================================
# [store] — Write-path limits for knowledge entry storage
# =============================================================================

[store]
# Maximum byte length for content on context_store and context_correct calls.
# The limit is byte-based (UTF-8), not character-based — multibyte characters
# (e.g., emoji, CJK) count toward this limit by their byte width, not character count.
# Entries should be focused and specific; large content should be split into
# multiple targeted entries.
# Range: [1000, 1048576]. Default: 8000
# max_content_bytes = 8000

# =============================================================================
# [observation] — Domain pack registration
# =============================================================================

[observation]
# Domain pack registration. Each [[observation.domain_packs]] entry connects an
# external event source to Unimatrix's observation pipeline.
#
# The built-in "claude-code" domain pack is ALWAYS active and requires no
# configuration here. It detects tool calls, phase transitions, and agent
# patterns from standard Claude Code sessions.
#
# To add a custom domain, uncomment and complete the example below:
#
# [[observation.domain_packs]]
# # Unique identifier for this domain. Must match ^[a-z0-9_-]{1,64}$.
# # The value "unknown" is reserved and will be rejected at startup.
# # REQUIRED — no default; omitting this field is a parse error.
# source_domain = "my-domain"
#
# # Event type strings accepted from this domain's event stream.
# # REQUIRED — no default; omitting this field is a parse error.
# event_types = ["deploy", "test_failure", "incident"]
#
# # Knowledge categories used by this domain's detection rules.
# # Must be a subset of the categories defined in [knowledge].
# # REQUIRED — no default; omitting this field is a parse error.
# categories = ["lesson-learned", "pattern"]
#
# # Path to a TOML file containing [[rules]] stanzas (RuleDescriptor).
# # Accepts absolute paths or paths relative to the config file location.
# # When absent, the pack registers no DSL rules (built-in Rust rules only).
# # Optional — Default: absent (None)
# # rule_file = "/path/to/rules.toml"

# =============================================================================
# Advanced Configuration
# Fields below require deep understanding of Unimatrix's internals to modify.
# Incorrect values can degrade retrieval quality. Change only when directed.
# =============================================================================

# =============================================================================
# [confidence] — Custom confidence weight components
# Active ONLY when preset = "custom". Ignored for all other preset values.
# =============================================================================

[confidence]
# Six-component weight vector. Required when preset = "custom".
# All six values must sum to exactly 0.92 (±1e-9). No partial override —
# all six must be specified when this block is uncommented.
#
# Component meanings:
#   base   — baseline trust granted to newly stored entries
#   usage  — weight of retrieval frequency signal
#   fresh  — weight of entry freshness (recency signal)
#   help   — weight of explicit helpfulness votes (context_store feedback)
#   corr   — weight of correction history (context_correct usage)
#   trust  — weight of the storing agent's trust level
#
# Example (values sum to 0.92 — verify before changing):
# [confidence.weights]
# base  = 0.20
# usage = 0.18
# fresh = 0.16
# help  = 0.15
# corr  = 0.15
# trust = 0.08
# # Sum: 0.92 — required

# =============================================================================
# [inference] — ML inference thread pool and retrieval tuning
# =============================================================================

[inference]
# Number of threads in the Rayon thread pool used for vector operations.
# This value is DYNAMICALLY computed at startup: (num_cpus / 2).max(4).min(8)
# Floor of 4 ensures at least 3 threads are free for concurrent MCP embedding
# calls when both the contradiction scan and quality-gate loop are active.
# Valid range: [1, 64]. Override only to reduce parallelism in constrained containers.
# rayon_pool_size = 4   # dynamic default shown; actual value depends on hardware

# Lookback window (days) for observations-sourced PhaseFreqTable rebuild.
# Governs the time window queried when building the phase frequency table used
# for phase-conditioned knowledge delivery.
# Range: [1, 3650]. Default: 30
phase_freq_lookback_days = 30

# Minimum distinct (phase, session_id) pair count required for a valid
# PhaseFreqTable rebuild. When the count falls below this threshold, the table
# sets use_fallback = true and phase affinity scoring is skipped for that cycle.
# Range: [1, 1000]. Default: 5
min_phase_session_pairs = 5

# -----------------------------------------------------------------------------
# Internal tuning — do not change unless directed by a support issue.
# These values control retrieval fusion weights, graph traversal, and PPR scoring.
# Incorrect values can silently degrade knowledge quality.
# -----------------------------------------------------------------------------
# ppr_alpha = 0.85
# ppr_iterations = 20
# ppr_inclusion_threshold = 0.05
# ppr_blend_weight = 0.15
# ppr_max_expand = 50
# ppr_expander_enabled = false
# w_sim = 0.50
# w_conf = 0.35
# w_phase_histogram = 0.02
# w_phase_explicit = 0.05
# supports_cosine_threshold = 0.65
