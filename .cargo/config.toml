# ONNX Runtime linking configuration.
# ort-sys 2.0.0-rc.11 download-binaries fetches ONNX Runtime 1.23 static libs
# compiled against glibc 2.38+. This environment has glibc 2.36 (Debian 12).
# Instead, we link dynamically against ONNX Runtime 1.20.1 installed at /usr/local/lib.
#
# Install: download aarch64 release from github.com/microsoft/onnxruntime/releases
# and place libonnxruntime.so* in /usr/local/lib, then run ldconfig.
[env]
ORT_LIB_LOCATION = "/usr/local/lib"
ORT_PREFER_DYNAMIC_LINK = "1"
